[project]
name = "python-template"
version = "0.10.0"
description = "Used to templatize python projects."
authors = [{ name = "Loïc Motheu" }]
readme = "README.md"
requires-python = ">=3.14,<4.0"
dependencies = [
    "loguru>=0.7.3,<0.8.0",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1,<2.0.0",
    "pre-commit>=4.5.1,<5.0.0",
    "pytest>=9.0.2,<10.0.0",
    "ruff>=0.15.2",
]
